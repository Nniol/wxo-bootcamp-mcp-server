host:
  name: "mcp-time-server"
  log_level: "INFO"

server:
  type: "stdio"
  auth: "bearer"

# optional overrides
sse:
  host: "0.0.0.0"
  port: 8080
  sse_path: "/sse"
  message_path: "/messages/"
  log_level: "info"
  access_log: false

# ── Proxy settings ─────────────────────────────────────────────────
proxy:
  enabled: false                 # turn proxy feature on/off
  namespace: proxy              # => proxy.<server>.<tool>

mcp_servers:
  hospital_data:
    enabled: true
    location: "."
    tools:
      enabled: true
      module: "hospital_data_server.hospital_data_tools"